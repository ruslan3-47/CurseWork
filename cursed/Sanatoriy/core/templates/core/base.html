<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{title}}</title>
    {% load static %}
    <link type="text/css" href="{% static 'core/css/style.css' %}" rel = "stylesheet">
</head>
<body>
    <h1>{{title}}</h1>
    {% block mainmenu %}
    <ul>
         {% for key, value in menu %}
          <li><a href="{{value}}">{{ key }}</a></li>
         {% endfor %}
    </ul>
    {% endblock mainmenu %}
    {% block content %}
    {% endblock content %}
</body>
</html>
